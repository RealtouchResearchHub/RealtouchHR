services:
  - type: web
    name: realtouchhr
    runtime: python
    buildCommand: cd frontend && npm install && CI=false npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Auth
      - key: JWT_SECRET
        generateValue: true
      # Set both to your Render service URL: https://realtouchhr.onrender.com
      - key: APP_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      # React — set to same Render URL so frontend calls the right backend
      - key: REACT_APP_BACKEND_URL
        sync: false
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      # Stripe
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # AI
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      # Companies House
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      # Stripe (both secret and publishable keys needed)
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # Google OAuth redirect must match your production domain exactly
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # 2FA / Admin
      - key: TOTP_ISSUER
        value: RealtouchHR
      - key: PLATFORM_ADMINS
        sync: false
      # HMRC / RTI
      - key: RTI_LIVE_SUBMISSION_ENABLED
        value: "false"
      - key: RTI_AUTO_PREPARE_ENABLED
        value: "false"
      - key: RTI_SYNC_MODE
        value: sandbox
