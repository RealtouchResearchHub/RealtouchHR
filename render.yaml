services:
  - type: web
    name: realtouchhr-api
    runtime: python
    # Backend only — frontend is deployed separately on Vercel
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Auth
      - key: JWT_SECRET
        generateValue: true
      # APP_URL = your FRONTEND URL (used for CORS, email links, OAuth redirects back to app)
      # Set to: https://www.realtouchhr.com
      - key: APP_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      # Google OAuth — REDIRECT_URI must point to this BACKEND service URL
      # e.g. https://realtouchhr-api.onrender.com/api/auth/google/callback
      # or https://api.realtouchhr.com/api/auth/google/callback if you set a custom domain
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      # Stripe
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # AI
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Email
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      # Companies House
      - key: COMPANIES_HOUSE_API_KEY
        sync: false
      # 2FA / Admin
      - key: TOTP_ISSUER
        value: RealtouchHR
      - key: PLATFORM_ADMINS
        sync: false
      # HMRC / RTI — keep sandbox for Phase 1
      - key: RTI_LIVE_SUBMISSION_ENABLED
        value: "false"
      - key: RTI_AUTO_PREPARE_ENABLED
        value: "false"
      - key: RTI_SYNC_MODE
        value: sandbox
